openapi: 3.0.3
info:
  title: Sports Facilities API
  version: 1.0.0
  description: >
    API REST para consultar instalaciones deportivas, deportes y
    registros meteorológicos asociados.

servers:
  - url: http://localhost:3000

paths:
  /:
    get:
      summary: Check API status
      responses:
        '200':
          description: API running correctly
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Sports Facilities API is running

  /installations:
    get:
      summary: Get all installations
      description: Returns a list of sports installations
      parameters:
        - in: query
          name: city
          required: false
          schema:
            type: string
          description: Filter installations by city

        - in: query
          name: type
          required: false
          schema:
            type: string
          description: Filter installations by type

        - in: query
          name: sport
          required: false
          schema:
            type: string
          description: Filter installations by sport name

        - in: query
          name: page
          required: false
          schema:
            type: integer
            example: 1
          description: Page number for pagination

        - in: query
          name: limit
          required: false
          schema:
            type: integer
            example: 10
          description: Number of results per page

      responses:
        '200':
          description: List of installations returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Installation'

    post:
      summary: Create a new installation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstallationInput'
      responses:
        '201':
          description: Installation created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Installation'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /installations/{id}:
    get:
      summary: Get installation by id
      description: Returns a sports installation by its identifier. Supports XML if requested via Accept header.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Installation identifier
      responses:
        '200':
          description: Installation returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Installation'
            application/xml:
              schema:
                $ref: '#/components/schemas/Installation'
        '400':
          description: Invalid ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Installation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update installation by id
      description: Updates an existing sports installation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Installation identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstallationInput'
      responses:
        '200':
          description: Installation updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Installation'
        '400':
          description: Missing required fields or invalid ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Installation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete installation by id
      description: Deletes an existing sports installation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Installation identifier
      responses:
        '200':
          description: Installation deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Installation deleted successfully
        '400':
          description: Invalid ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Installation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sports:
    get:
      summary: Get all sports (Not implemented yet)
      responses:
        '200':
          description: List of sports
  /weather-records:
    get:
      summary: Get all weather records (Not implemented yet)
      responses:
        '200':
          description: List of weather records

components:
  schemas:
    SportReference:
      type: object
      properties:
        sportId:
          type: string
          example: "507f1f77bcf86cd799439011"
        name:
          type: string
          example: Baloncesto

    GeoPoint:
      type: object
      properties:
        type:
          type: string
          example: Point
        coordinates:
          type: array
          items:
            type: number
          example: [-3.7, 40.4]

    Installation:
      type: object
      properties:
        id:
          type: string
          example: "67926b0a8863f61b0c000001"
        name:
          type: string
          example: Polideportivo Municipal
        type:
          type: string
          example: polideportivo
        city:
          type: string
          example: Madrid
        sports:
          type: array
          items:
            $ref: '#/components/schemas/SportReference'
        location:
          $ref: '#/components/schemas/GeoPoint'
        externalId:
          type: string
          example: osm_123
        source:
          type: string
          example: OpenStreetMap
        lastUpdated:
          type: string
          format: date-time
          example: "2024-03-24T12:00:00Z"

    InstallationInput:
      type: object
      required:
        - name
        - type
        - city
      properties:
        name:
          type: string
          example: Polideportivo Municipal
        type:
          type: string
          example: polideportivo
        city:
          type: string
          example: Madrid
        sports:
          type: array
          items:
            $ref: '#/components/schemas/SportReference'
        location:
          $ref: '#/components/schemas/GeoPoint'
        externalId:
          type: string
          example: osm_123
        source:
          type: string
          example: OpenStreetMap
        lastUpdated:
          type: string
          format: date-time
          example: "2024-03-24T12:00:00Z"

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 404
        message:
          type: string
          example: Installation not found
