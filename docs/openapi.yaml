openapi: 3.0.3
info:
  title: Sports Facilities API
  version: 1.0.0
  description: >
    API REST para gestionar instalaciones deportivas. Actualmente el
    recurso plenamente operativo es /installations.

servers:
  - url: http://localhost:3000

paths:
  /:
    get:
      summary: Check API status
      responses:
        '200':
          description: API running correctly
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Sports Facilities API is running

  /installations:
    get:
      summary: Obtener instalaciones
      description: Devuelve instalaciones con filtros opcionales y paginación.
      parameters:
        - in: query
          name: name
          required: false
          schema:
            type: string
          description: Filtra por nombre de instalación. La búsqueda es parcial y no distingue mayúsculas.

        - in: query
          name: city
          required: false
          schema:
            type: string
          description: Filtra por ciudad. Debe ser un texto no vacío.

        - in: query
          name: type
          required: false
          schema:
            type: string
          description: Filtra por tipo. Debe ser un texto no vacío.

        - in: query
          name: sport
          required: false
          schema:
            type: string
          description: Filtra por nombre del deporte. Debe ser un texto no vacío.

        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            example: 1
          description: Número de página. Debe ser un entero mayor que 0.

        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 10
          description: Número de resultados por página. Debe estar entre 1 y 100.

      responses:
        '200':
          description: Lista de instalaciones obtenida correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallationsListResponse'
        '400':
          description: Filtros o paginación no válidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Crear instalación
      description: Crea una instalación validando el cuerpo JSON antes de guardarlo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstallationInput'
      responses:
        '201':
          description: Instalación creada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Installation'
        '400':
          description: JSON inválido o faltan campos obligatorios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /installations/{id}:
    get:
      summary: Obtener instalación por id
      description: >
        Devuelve una instalación por su identificador. Si el cliente envía
        Accept: application/xml, la respuesta se serializa a XML.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Identificador MongoDB de la instalación
      responses:
        '200':
          description: Instalación obtenida correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Installation'
            application/xml:
              schema:
                $ref: '#/components/schemas/Installation'
        '400':
          description: Formato de ID no válido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Instalación no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: La instalación existe pero no puede exportarse a XML por no cumplir el contrato mínimo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Actualizar instalación por id
      description: Actualiza una instalación existente. Este endpoint exige el documento completo.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Identificador MongoDB de la instalación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstallationInput'
      responses:
        '200':
          description: Instalación actualizada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Installation'
        '400':
          description: JSON inválido, faltan campos obligatorios o el ID no es válido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Instalación no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Eliminar instalación por id
      description: Elimina una instalación existente.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Identificador MongoDB de la instalación
      responses:
        '200':
          description: Instalación eliminada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '400':
          description: Formato de ID no válido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Instalación no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sports:
    get:
      summary: Get all sports (Not implemented yet)
      responses:
        '200':
          description: List of sports
  /weather-records:
    get:
      summary: Get all weather records (Not implemented yet)
      responses:
        '200':
          description: List of weather records

components:
  schemas:
    SportReference:
      type: object
      required:
        - name
      properties:
        sportId:
          type: string
          example: "507f1f77bcf86cd799439011"
        name:
          type: string
          example: Baloncesto

    GeoPoint:
      type: object
      required:
        - type
        - coordinates
      properties:
        type:
          type: string
          example: Point
        coordinates:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: number
          example: [-3.7, 40.4]

    Installation:
      type: object
      properties:
        id:
          type: string
          example: "67926b0a8863f61b0c000001"
        name:
          type: string
          example: Polideportivo Municipal
        type:
          type: string
          example: polideportivo
        city:
          type: string
          example: Madrid
        sports:
          type: array
          items:
            $ref: '#/components/schemas/SportReference'
        location:
          $ref: '#/components/schemas/GeoPoint'
        externalId:
          type: string
          example: osm_123
        source:
          type: string
          example: OpenStreetMap
        lastUpdated:
          type: string
          format: date-time
          example: "2024-03-24T12:00:00Z"
        createdAt:
          type: string
          format: date-time
          example: "2024-03-24T12:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-03-24T12:00:00Z"

    InstallationInput:
      type: object
      required:
        - name
        - type
        - city
      properties:
        name:
          type: string
          example: Polideportivo Municipal
        type:
          type: string
          example: polideportivo
        city:
          type: string
          example: Madrid
        sports:
          type: array
          items:
            $ref: '#/components/schemas/SportReference'
        location:
          $ref: '#/components/schemas/GeoPoint'
        externalId:
          type: string
          example: osm_123
        source:
          type: string
          example: OpenStreetMap
        lastUpdated:
          type: string
          format: date-time
          example: "2024-03-24T12:00:00Z"

    InstallationsListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Installation'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    PaginationInfo:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10

    DeleteResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        message:
          type: string
          example: Instalación eliminada correctamente

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 404
        message:
          type: string
          example: Instalación no encontrada
